version: 2

models:
    - name: fact_trips
      description: Fact table that contains information about trips, including trip duration, net revenue, fraud indicators and corporate trip flag.
      config:
        meta: 
          owner: data_analyst_team
        tags: ["finance", "operations", "fraud"]
      columns:
        - name: trip_id
          description: The unique identifier for each trip (primary key).
          tests:
            - not_null
        - name: rider_id
          description: The unique identifier for the rider associated with the trip (foreign key to dim_riders).
        - name: driver_id
          description: The unique identifier for the driver associated with the trip (foreign key to dim_drivers).
        - name: city_id
          description: The unique identifier for the city where the trip took place (foreign key to dim_cities).
        - name: city_name
          description: The name of the city where the trip took place.
        - name: requested_at
          description: The timestamp when the trip was requested.
        - name: pickup_at
          description: The timestamp when the driver picked up the rider.
        - name: dropoff_at
          description: The timestamp when the driver dropped off the rider.
        - name: trip_duration_minutes
          description: The duration of the trip in minutes.
        - name: trip_status
          description: The status of the trip whether completed or cancelled.
        - name: payment_method
          description: The method of payment used for the trip credit card, cash).
        - name: is_corporate
          description: A flag indicating whether the trip was a corporate trip.
        - name: amount
          description: The total amount charged for the trip before any deductions.
        - name: fee
          description: The fee deducted from the total amount for the trip.
        - name: net_revenue
          description: The net revenue generated from the trip after deducting any fees.
        - name: failed_payment_on_complted_trip
          description: A flag indicating whether there was a failed payment on a completed trip.
        - name: duplicate_trip_payments
          description: A flag indicating whether there was a duplicate payment for the trip.
        - name: extreme_surge_multiplier
          description: The multiplier for extreme surge pricing during the trip.
        - name: load_timestamp
          description: The timestamp when the trip data was loaded into the data warehouse.
        

    - name: dim_drivers
      description: Dimension table that contains information about drivers, including their lifetime trips, gross and net revenue, status, rating and churn status.
      config:
        meta: 
          owner: operations_team
        tags: ["drivers", "operations", "churn", "revenue"]
      columns:
        - name: driver_id
          description: The unique identifier for each driver (primary key).
          tests:
            - not_null
            - unique
        - name: driver_status
          description: The current status of the driver (active, inactive, or suspended).
        - name: last_trip_date
          description: The date of the driver's most recent trip.
        - name: driver_lifetime_count
          description: The total number of trips completed by the driver over their lifetime.
        - name: churn_flag
          description: A flag indicating whether the driver is at risk of churning based on their activity and trip history.
        - name: total_gross_revenue
          description: The total gross revenue generated by the driver from all completed trips.
        - name: total_net_revenue
          description: The total net revenue generated by the driver from all completed trips after deducting fees
        - name: rating
          description: The average rating of the driver based on rider feedback.
    
    - name: dim_riders
      description: Dimension table that contains information about riders, including their lifetime value.
      config:
        meta: 
          owner: marketing_team
        tags: ["riders", "marketing", "lifetime_value"]
      columns:
        - name: rider_id
          description: The unique identifier for each rider (primary key).
          tests:
            - not_null
            - unique
        - name: signup_date
          description: The date when the rider signed up for the service.
        - name: country
          description: The country where the rider is located.
        - name: rider_lifetime_value
          description: The total revenue generated by the rider from all completed trips over their lifetime.
        - name: is_corporate
          description: A flag indicating whether the rider is associated with a corporate account.
        - name: corporate_trip_flag
          description: A flag indicating whether the rider has taken any corporate trips.
    
    - name: dim_cities
      description: Dimension table that contains information about cities, including city name and country.
      config:
        meta: 
          owner: operations_team
        tags: ["cities", "operations"]
      columns:
        - name: city_id
          description: The unique identifier for each city (primary key).
          tests:
            - not_null
            - unique
        - name: city_name
          description: The name of the city.
        - name: country
          description: The country where the city is located.
        - name: created_at
          description: The timestamp for date of trip.
        - name: city_revenue_by_day
          description: The total revenue generated from trips in the city on a daily basis.
        
        
   